name: Build NeoForge

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build NeoForge
        run: ./gradlew :NeoForge:build --configure-on-demand --no-daemon
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carryon-neoforge-${{ github.run_number }}
          path: |
            NeoForge/build/libs/*.jar
          retention-days: 30
